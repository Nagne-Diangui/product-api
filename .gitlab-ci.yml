stages:
  - test
  - build
  - docker

variables:
  # Cache Maven dans le home de gitlab-runner — persiste entre les builds
  MAVEN_OPTS: "-Dmaven.repo.local=/home/gitlab-runner/.m2/repository"
  JAVA_HOME: "/usr/lib/jvm/java-21-openjdk-amd64"

# JOB 1 : Lancer les tests unitaires
test:
  stage: test
  tags:
    - vm1
  script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml << EOF
      <settings>
        <mirrors>
          <mirror>
            <id>maven-default-http-blocker</id>
            <mirrorOf>dummy</mirrorOf>
            <url>http://0.0.0.0/</url>
            <blocked>false</blocked>
          </mirror>
        </mirrors>
        <servers>
          <server>
            <id>nexus-releases</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
          <server>
            <id>nexus-snapshots</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
        </servers>
      </settings>
      EOF
    - mvn test

# JOB 2 : Compiler le projet et générer le JAR
build:
  stage: build
  tags:
    - vm1
  script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml << EOF
      <settings>
        <mirrors>
          <mirror>
            <id>maven-default-http-blocker</id>
            <mirrorOf>dummy</mirrorOf>
            <url>http://0.0.0.0/</url>
            <blocked>false</blocked>
          </mirror>
        </mirrors>
        <servers>
          <server>
            <id>nexus-releases</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
          <server>
            <id>nexus-snapshots</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
        </servers>
      </settings>
      EOF
    - mvn clean package -DskipTests

# JOB 3 : Construire l'image Docker et la pousser sur Docker Hub
docker:
  stage: docker
  tags:
    - vm1
  script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml << EOF
      <settings>
        <mirrors>
          <mirror>
            <id>maven-default-http-blocker</id>
            <mirrorOf>dummy</mirrorOf>
            <url>http://0.0.0.0/</url>
            <blocked>false</blocked>
          </mirror>
        </mirrors>
        <servers>
          <server>
            <id>nexus-releases</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
          <server>
            <id>nexus-snapshots</id>
            <username>admin</username>
            <password>${NEXUS_PASSWORD}</password>
          </server>
        </servers>
      </settings>
      EOF
    - mvn clean package -DskipTests
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:latest

# Ce pipeline se déclenche uniquement sur la branche develop
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
