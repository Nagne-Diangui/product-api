global:
  # Intervalle par défaut : toutes les 10 secondes
  scrape_interval: 10s

scrape_configs:
  - job_name: "product-api"
    # Prometheus va interroger cette URL toutes les 10s
    # http://192.168.1.16 = IP de VM1 (via Nginx reverse proxy)
    # /l3gl/actuator/prometheus = chemin exposé par Spring Boot Actuator
    metrics_path: "/l3gl/actuator/prometheus"
    static_configs:
      - targets:
          - "192.168.1.16:80"
